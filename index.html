function migrateLegacy(old){let s=fresh(); if(!old)return s; try{ if(old.cur!=null)s.cur=old.cur; if(old.goals)s.goals=old.goals.map(g=>({id:g.id||uid(),name:g.name,target:+g.target||0,current:+g.current||0,monthly:+g.monthly||0})); if(old.tx){s.tx=old.tx.map(t=>{let isCard=['C6 Bank','C6 Inter','Nubank'].includes(t.account);let cardId=t.account==='C6 Bank'?'c6bank':t.account==='C6 Inter'?'inter':t.account==='Nubank'?'nubank':null;return{id:t.id||uid(),type:t.kind==='income'?'income':'expense',name:t.name,category:t.category||'Geral',amount:+t.amount||0,start:t.start||0,end:t.end??null,recurrence:t.recurrence||'monthly',dueDay:dayFromNote(t.note),status:{},payment:cardId||t.account||'Conta Corrente',reimbursable:false,note:t.note||''}})} if(old.parcels){s.parcels=old.parcels.map(p=>({id:p.id||uid(),name:p.name,category:p.category||'Geral',amount:+p.amount||0,start:p.start||0,total:+p.total||1,paidBefore:+p.paidBefore||0,payment:p.account==='C6 Bank'?'c6bank':p.account==='C6 Inter'?'inter':p.account==='Nubank'?'nubank':p.account||'Conta Corrente',status:{}}))} }catch(e){console.warn('Migração parcial',e)} return s}
function backupPayload(reason,data=state){return{app:'Orbe Finanças',version:APP_VERSION,reason,exportedAt:new Date().toISOString(),data:JSON.parse(JSON.stringify(data||{}))}}
function backupList(){try{return JSON.parse(localStorage.getItem(BACKUP_STORE)||'[]')}catch(e){return[]}}
function storeAutomaticBackup(reason,data=state){let list=backupList();list.unshift(backupPayload(reason,data));localStorage.setItem(BACKUP_STORE,JSON.stringify(list.slice(0,10)));return list[0]}
function logChange(type,item,oldValue,newValue,month=state?.cur){if(!state)return;state.history=state.history||[];state.history.unshift({id:uid(),at:new Date().toISOString(),type,item:item||'',oldValue,newValue,month});state.history=state.history.slice(0,HISTORY_LIMIT)}
function hydrateState(s){s=s||fresh();s.version=s.version||APP_VERSION;s.history=s.history||[];s.ui=s.ui||{collapsed:{}};s.ui.collapsed=s.ui.collapsed||{};s.closed=s.closed||{};return s}
function load(){let n=localStorage.getItem(NEW_STORE); if(n){let s=hydrateState(JSON.parse(n)); if(s.baseline!=='jul2026-v2'){storeAutomaticBackup('backup antes da atualização de dados',s);let old=s,base=fresh();base.ui=old.ui||base.ui;base.goals=(old.goals&&old.goals.length)?old.goals:base.goals;base.closed=old.closed||{};base.history=old.history||[];localStorage.setItem(NEW_STORE,JSON.stringify(hydrateState(base)));return hydrateState(base)} return s} for(let k of LEGACY){let raw=localStorage.getItem(k); if(raw){let legacy=JSON.parse(raw);storeAutomaticBackup('backup antes da migração de '+k,legacy);let old=migrateLegacy(legacy);let base=fresh();base.ui=old.ui||base.ui;base.goals=(old.goals&&old.goals.length)?old.goals:base.goals;base.closed=old.closed||{};base.history=old.history||[];localStorage.setItem(NEW_STORE,JSON.stringify(hydrateState(base)));return hydrateState(base)}} return hydrateState(fresh())}
let state=hydrateState(load()); function save(){localStorage.setItem(NEW_STORE,JSON.stringify(hydrateState(state)))}
function activeTx(m){return state.tx.filter(t=>m>=t.start&&(t.end==null||m<=t.end)&&(t.recurrence==='monthly'||t.start===m)).map(t=>({...t,month:m,kind:t.type,isParcel:false}))}
function parcelOcc(m){let out=[];state.parcels.forEach(p=>{let n=m-p.start+1+(p.paidBefore||0);if(m>=p.start&&n>(p.paidBefore||0)&&n<=p.total)out.push({...p,type:'expense',kind:'expense',month:m,isParcel:true,occ:n,dueDay:10,recurrence:'parcel'});});return out}
function isOpeningBalance(x){return x&&x.type==='income'&&(/sobra|saldo anterior|saldo inicial|caixa inicial/i.test(String(x.name||''))||/saldo anterior|saldo inicial/i.test(String(x.category||'')))}
function statusOf(x,m=state.cur){let k=monthKey(m),s=(x.status||{})[k]; if(s)return s; let today=new Date(),due=new Date(START_Y,START_M+m,x.dueDay||10); if(due<new Date(today.getFullYear(),today.getMonth(),today.getDate()) && m<=currentIndex())return 'late'; return 'pending'}
function calc(m=state.cur){let all=[...activeTx(m),...parcelOcc(m)], openingBalances=all.filter(isOpeningBalance), incomes=all.filter(x=>x.type==='income'&&!isOpeningBalance(x)), expenses=all.filter(x=>x.type==='expense'), personalExpenses=expenses.filter(x=>!x.reimbursable);let paidOut=personalExpenses.filter(x=>statusOf(x,m)==='paid').reduce((a,x)=>a+x.amount,0);let paidIn=incomes.filter(x=>statusOf(x,m)==='paid').reduce((a,x)=>a+x.amount,0);let incoming=incomes.filter(x=>statusOf(x,m)!=='paid').reduce((a,x)=>a+x.amount,0);let committed=personalExpenses.filter(x=>statusOf(x,m)!=='paid').reduce((a,x)=>a+x.amount,0);let currentCash=state.cash+paidIn-paidOut;let available=currentCash-committed;let cards={};state.cards.forEach(c=>{let items=expenses.filter(x=>x.payment===c.id&&!x.reimbursable);let pending=items.filter(x=>statusOf(x,m)!=='paid');let paid=items.filter(x=>statusOf(x,m)==='paid');let total=items.reduce((a,x)=>a+x.amount,0),pendingTotal=pending.reduce((a,x)=>a+x.amount,0),paidTotal=paid.reduce((a,x)=>a+x.amount,0);cards[c.id]={...c,items,pending,paid,total,pendingTotal,paidTotal,personal:pendingTotal,reimb:0}});let net=available+state.goals.reduce((a,g)=>a+g.current,0);return{all,openingBalances,incomes,expenses,personalExpenses,incoming,committed,currentCash,available,projected:available,free:available,paidOut,paidIn,cards,net}}
function cardName(id){return state.cards.find(c=>c.id===id)?.name||id} function payName(x){return state.cards.some(c=>c.id===x.payment)?cardName(x.payment):x.payment}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){save();let d=calc();el('monthLabel').textContent=monthName(state.cur);el('hero-free').textContent=fmt(d.free);el('hero-cash').textContent=fmt(d.currentCash);el('hero-in').textContent=fmt(d.incoming);el('hero-out').textContent=fmt(d.committed);el('k-cash').textContent=fmt(d.currentCash);el('k-incoming').textContent=fmt(d.incoming);el('k-payable').textContent=fmt(d.committed);el('k-health').textContent=health(d);renderPanelSections(d);renderAlerts(d);renderFlow(d);renderCards(d);renderAgenda(d);renderCharts(d);renderGoals();renderHistory();}

function renderPanelSections(d){let fixed=d.expenses.filter(x=>!isCardPayment(x)&&!x.reimbursable&&x.payment!=='Reserva').sort((a,b)=>(a.dueDay||10)-(b.dueDay||10));let cardItems=d.expenses.filter(x=>isCardPayment(x)&&!x.reimbursable).sort((a,b)=>(a.dueDay||10)-(b.dueDay||10));let incomes=d.incomes.slice().sort((a,b)=>(a.dueDay||10)-(b.dueDay||10));let reserve=d.expenses.filter(x=>x.payment==='Reserva').sort((a,b)=>(a.dueDay||10)-(b.dueDay||10));el('panel-sections').innerHTML=sectionHTML('panel-fixed','📌','Gastos fixos',fixed,'red')+sectionHTML('panel-cards','💳','Cartões',cardItems,'red')+sectionHTML('panel-income','💰','Entradas',incomes,'green')+sectionHTML('panel-goals','🎯','Objetivos / reservas',reserve,'orange')}

function sectionTotal(arr){return arr.reduce((a,x)=>a+(+x.amount||0),0)}

function sectionHTML(key,icon,title,arr,color='red',sub=''){
  let closed=!!(state.ui&&state.ui.collapsed&&state.ui.collapsed[key]);
  let late=arr.filter(x=>statusOf(x)==='late').length, paid=arr.filter(x=>statusOf(x)==='paid').length;

  return `<div class="flow-section card"><button class="flow-head" onclick="toggleSection('${key}')"><div class="title"><span class="ico">${icon}</span><div><div>${title}</div><small>${meta.join(' · ')}</small></div></div><div class="flow-right"><b class="${color}">${fmt(sectionTotal(arr))}</b><span class="chev ${closed?'':'open'}">▼</span></div></button><div class="body ${closed?'hidden':''}">${arr.map(x=>itemRow(x)).join('')||empty('Nada aqui')}</div></div>`

function renderFlow(d){
  let incomes=d.incomes.slice().sort((a,b)=>(a.dueDay||10)-(b.dueDay||10));
  let fixed=d.expenses.filter(x=>!isCardPayment(x)&&!x.reimbursable&&x.payment!=='Reserva').sort((a,b)=>(a.dueDay||10)-(b.dueDay||10));
  let cardItems=d.expenses.filter(x=>isCardPayment(x)&&!x.reimbursable).sort((a,b)=>(a.dueDay||10)-(b.dueDay||10));
  let reimb=d.expenses.filter(x=>x.reimbursable).sort((a,b)=>(a.dueDay||10)-(b.dueDay||10));
  let reserve=d.expenses.filter(x=>x.payment==='Reserva').sort((a,b)=>(a.dueDay||10)-(b.dueDay||10));
  let opening=d.openingBalances||[];
  el('flow-total').textContent=fmt(d.available);
  if(state.flowFilter==='income') return el('flow-list').innerHTML=sectionHTML('sec-income','💵','Entradas a receber',incomes,'green');

  if(state.flowFilter==='reimbursement') return el('flow-list').innerHTML=sectionHTML('sec-reimb','🤝','Reembolsáveis',reimb,'orange');
  el('flow-list').innerHTML=(opening.length?sectionHTML('sec-opening','🏦','Saldo inicial / sobra anterior',opening,'blue','não conta como receita nova'):'')+sectionHTML('sec-income','💵','Entradas a receber',incomes,'green')+sectionHTML('sec-fixed','📌','Gastos fixos',fixed,'red')+sectionHTML('sec-cards','💳','Cartões',cardItems,'red')+(reimb.length?sectionHTML('sec-reimb','🤝','Reembolsáveis',reimb,'orange'):'')+(reserve.length?sectionHTML('sec-reserve','🛡️','Reserva / objetivos',reserve,'orange'):'')
}

function renderAgenda(d){let all=d.all.slice().sort((a,b)=>(a.dueDay||10)-(b.dueDay||10));let groups={Hoje:[], 'Próximos 7 dias':[], 'Próximos 30 dias':[]};let today=new Date().getDate();all.forEach(x=>{let dd=x.dueDay||10;if(state.cur!==currentIndex())groups['Próximos 30 dias'].push(x);else if(dd===today)groups.Hoje.push(x);else if(dd>today&&dd<=today+7)groups['Próximos 7 dias'].push(x);else groups['Próximos 30 dias'].push(x)});el('agenda-list').innerHTML=Object.entries(groups).map(([g,arr])=>`<div class="sub-hd">${g}</div>${arr.map(x=>itemRow(x)).join('')||empty('Nada aqui')}`).join('')}

function editItem(id,isParcel){if(isParcel)return editParcel(id);let t=state.tx.find(x=>x.id===id);if(!t)return;let recurring=t.recurrence==='monthly';openModal('Editar lançamento',`<div class="field"><label>Nome</label><input id="f-name" value="${esc(t.name)}"></div><div class="field"><label>Valor</label><input id="f-val" type="number" step="0.01" value="${t.amount}"></div><div class="field"><label>Categoria</label><input id="f-cat" value="${esc(t.category)}"></div><div class="field"><label>Forma de pagamento</label><select id="f-pay">${paymentOptions(t.payment)}</select></div><div class="field"><label>Dia</label><input id="f-day" type="number" value="${t.dueDay||10}"></div>${recurring?`<div class="field"><label>Aplicar</label><select id="f-scope"><option value="single">Só neste mês</option><option value="future">Deste mês em diante</option><option value="all">Em todos os meses</option></select></div>`:`<input id="f-scope" type="hidden" value="all">`}<div class="field"><label>Reembolsável</label><select id="f-reimb"><option value="0">Não</option><option value="1" ${t.reimbursable?'selected':''}>Sim</option></select></div>`+actions(`saveEdit('${id}')`))}
function editedFields(t){return{name:el('f-name').value.trim(),amount:+el('f-val').value,category:el('f-cat').value,payment:el('f-pay').value,dueDay:+el('f-day').value||10,reimbursable:el('f-reimb').value==='1'}}
function saveEdit(id){let t=state.tx.find(x=>x.id===id);if(!t)return;let before=fieldSnapshot(t),fields=editedFields(t),scope=el('f-scope').value;storeAutomaticBackup('backup antes de editar '+t.name);if(t.recurrence!=='monthly'||scope==='all'){Object.assign(t,fields);logChange('edição',t.name,before,fieldSnapshot(t));closeModal();return render()}if(scope==='future'){if(t.start===state.cur){Object.assign(t,fields)}else{let oldEnd=t.end;t.end=state.cur-1;state.tx.push({...t,...fields,id:uid(),start:state.cur,end:oldEnd,status:{}})}logChange('edição futura',fields.name,before,fields);closeModal();return render()}let oldEnd=t.end;t.end=state.cur-1;state.tx.push({...t,...fields,id:uid(),start:state.cur,end:state.cur,recurrence:'once',status:{}});if(oldEnd==null||oldEnd>state.cur)state.tx.push({...t,id:uid(),start:state.cur+1,end:oldEnd,status:{}});logChange('edição mensal',fields.name,before,fields);closeModal();render()}
function deleteItem(id,isParcel){if(isParcel)return payParcel(id);let t=state.tx.find(x=>x.id===id);if(!t)return;if(t.recurrence!=='monthly')return applyDelete(id,'all');openModal('Apagar lançamento',`<div class="field"><label>Aplicar</label><select id="d-scope"><option value="single">Apagar só deste mês</option><option value="future">Apagar deste mês em diante</option><option value="all">Apagar de todos os meses</option></select></div>`+actions(`applyDelete('${id}',document.getElementById('d-scope').value)`))}
function applyDelete(id,scope){let t=state.tx.find(x=>x.id===id);if(!t)return;storeAutomaticBackup('backup antes de apagar '+t.name);let before=fieldSnapshot(t);if(t.recurrence!=='monthly'||scope==='all'){state.tx=state.tx.filter(x=>x.id!==id)}else if(scope==='future'){t.end=state.cur-1}else{let oldEnd=t.end;t.end=state.cur-1;if(oldEnd==null||oldEnd>state.cur)state.tx.push({...t,id:uid(),start:state.cur+1,end:oldEnd,status:{}})}logChange('exclusão',t.name,before,{scope});closeModal();render()}
function togglePaid(id,isParcel){let x=isParcel?state.parcels.find(p=>p.id===id):state.tx.find(t=>t.id===id); if(!x)return;let k=monthKey(state.cur),old=(x.status||{})[k]||'pending';x.status=x.status||{};x.status[k]=old==='paid'?'pending':'paid';logChange(x.type==='income'?'recebimento':'pagamento',x.name,old,x.status[k]);render()}
function openParcel(){openModal('Compra parcelada',`<div class="field"><label>Nome</label><input id="p-name"></div><div class="field"><label>Valor da parcela</label><input id="p-val" type="number" step="0.01"></div><div class="field"><label>Total de parcelas</label><input id="p-total" type="number" value="10"></div><div class="field"><label>Categoria</label><input id="p-cat" value="Geral"></div><div class="field"><label>Cartão/conta</label><select id="p-pay">${paymentOptions('inter')}</select></div>`+actions('saveParcel()'))}
function saveParcel(){let name=el('p-name').value.trim(),amount=+el('p-val').value,total=+el('p-total').value;if(!name||!amount||!total)return alert('Preencha os dados.');state.parcels.push({id:uid(),name,category:el('p-cat').value||'Geral',amount,start:state.cur,total,paidBefore:0,payment:el('p-pay').value,status:{}});closeModal();render()}
function editParcel(id){let p=state.parcels.find(x=>x.id===id);openModal('Editar parcela',`<div class="field"><label>Nome</label><input id="p-name" value="${esc(p.name)}"></div><div class="field"><label>Valor</label><input id="p-val" type="number" value="${p.amount}"></div><div class="field"><label>Total</label><input id="p-total" type="number" value="${p.total}"></div><div class="field"><label>Pagamento</label><select id="p-pay">${paymentOptions(p.payment)}</select></div>`+actions(`saveParcelEdit('${id}')`))}
function saveParcelEdit(id){let p=state.parcels.find(x=>x.id===id);let before={name:p.name,amount:p.amount,total:p.total,payment:p.payment};storeAutomaticBackup('backup antes de editar parcela '+p.name);p.name=el('p-name').value;p.amount=+el('p-val').value;p.total=+el('p-total').value;p.payment=el('p-pay').value;logChange('edição de parcela',p.name,before,{name:p.name,amount:p.amount,total:p.total,payment:p.payment});closeModal();render()} function payParcel(id){let p=state.parcels.find(x=>x.id===id);if(p&&confirm('Quitar/remover próximas parcelas?')){storeAutomaticBackup('backup antes de quitar parcela '+p.name);let before={total:p.total};p.total=Math.max(0,state.cur-p.start+(p.paidBefore||0));logChange('exclusão de parcela',p.name,before,{total:p.total});render()}}
function openGoal(){openModal('Nova meta',`<div class="field"><label>Nome</label><input id="g-name"></div><div class="field"><label>Meta</label><input id="g-target" type="number"></div><div class="field"><label>Valor atual</label><input id="g-current" type="number" value="0"></div><div class="field"><label>Aporte mensal</label><input id="g-monthly" type="number" value="0"></div>`+actions('saveGoal()'))} function saveGoal(){state.goals.push({id:uid(),name:el('g-name').value,target:+el('g-target').value,current:+el('g-current').value,monthly:+el('g-monthly').value});closeModal();render()} function editGoal(id){let g=state.goals.find(x=>x.id===id);openModal('Editar meta',`<div class="field"><label>Nome</label><input id="g-name" value="${esc(g.name)}"></div><div class="field"><label>Meta</label><input id="g-target" type="number" value="${g.target}"></div><div class="field"><label>Valor atual</label><input id="g-current" type="number" value="${g.current}"></div><div class="field"><label>Aporte mensal</label><input id="g-monthly" type="number" value="${g.monthly||0}"></div>`+actions(`saveGoalEdit('${id}')`))} function saveGoalEdit(id){let g=state.goals.find(x=>x.id===id);g.name=el('g-name').value;g.target=+el('g-target').value;g.current=+el('g-current').value;g.monthly=+el('g-monthly').value;closeModal();render()} function delGoal(id){let g=state.goals.find(x=>x.id===id);storeAutomaticBackup('backup antes de apagar meta '+(g?.name||''));state.goals=state.goals.filter(x=>x.id!==id);logChange('exclusão de meta',g?.name||'',g,null);render()}
function renderHistory(){let box=el('history-list');if(!box)return;let hist=state.history||[];box.innerHTML=hist.slice(0,30).map(h=>`<div class="item"><div><div class="item-name">${esc(h.type)} · ${esc(h.item||'')}</div><div class="item-sub">${new Date(h.at).toLocaleString('pt-BR')} · ${monthName(h.month??state.cur)}</div></div></div>`).join('')||empty('Nenhuma alteração registrada')}
function exportBackup(){download('orbe-backup.json',JSON.stringify(backupPayload('exportação manual'),null,2),'application/json')}
function createManualBackup(){storeAutomaticBackup('backup manual');alert('Backup automático criado neste dispositivo.');renderHistory()}
function importBackup(){let inp=el('file-import');inp.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let parsed=JSON.parse(r.result),next=parsed.data||parsed;storeAutomaticBackup('backup antes da importação');state=hydrateState(next);logChange('importação de backup','Backup importado',null,{arquivo:f.name});render()}catch(err){alert('Não foi possível importar este backup.')}};r.readAsText(f)};inp.click()}
function restoreLatestBackup(){let latest=backupList()[0];if(!latest)return alert('Nenhum backup automático encontrado.');if(confirm('Restaurar o último backup automático?')){storeAutomaticBackup('backup antes de restaurar último backup');state=hydrateState(latest.data);logChange('restauração de backup','Último backup',null,{data:latest.exportedAt});render()}}
function exportCSV(){let rows=['mes,tipo,nome,categoria,pagamento,valor,status'];calc().all.forEach(x=>rows.push(`"${monthName(state.cur)}","${x.type}","${x.name}","${x.category}","${payName(x)}",${x.amount},"${statusOf(x)}"`));download('orbe-fluxo.csv',rows.join('\n'),'text/csv')}
function download(name,data,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click()}
function resetApp(){if(confirm('Resetar tudo? Antes, exporte backup.')){storeAutomaticBackup('backup antes de resetar app');localStorage.removeItem(NEW_STORE);state=hydrateState(fresh());logChange('reset','App resetado',null,null);render()}}
if('serviceWorker' in navigator)navigator.serviceWorker.register('service-worker.js');render();
</script>
</body>
